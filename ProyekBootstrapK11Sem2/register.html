        body {

            padding: 20px;

        .container-2 {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding-top: 1vh;
            padding-left: 2vw;
            padding-right: 2vw;
            padding-bottom: 2vh;
        }
       
        h1 {

            margin-bottom: 25px;
            color: #333;
            font-size: 26px;
        }
       
        .form-group {
            margin-bottom: 15px;
        }
       
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
            font-size: 13px;
        }
       
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }
       
        input:focus, select:focus {
            outline: none;
            border-color: #333;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
        }
       
        button {
            width: 100%;
            padding: 11px;
            background: #000;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
       
        button:hover {
            background: #333;
        }
       
        .required::after {
            content: " *";
            color: red;
        }
       
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
